-top:8px}.arch-step{border:1px solid #333;background:#101010;border-radius:9px;padding:7px 9px;min-width:72px;text-align:center}.arch-step b{display:block;color:#fff;font-size:12px}.arch-step span{display:block;color:#888;font-size:11px;margin-top:2px}.arch-arrow{color:#777;font-size:13px}.empty-note{font-size:13px;line-height:1.65;color:#858585}.rel{display:block;color:#ddd;text-decoration:none;border:1px solid #252525;border-radius:8px;padding:7px 9px;margin:6px 0;background:#111;font-size:12px}.rel:hover{border-color:#555;background:#151515}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.btn{border:0;background:#f4f4f4;color:#050505;text-decoration:none;border-radius:7px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}.btn.secondary{background:#151515;color:#ddd;border:1px solid #333}.btn.ghost{background:transparent;color:#bbb;border:1px solid #2a2a2a}.btn:disabled{opacity:.5;cursor:not-allowed}.mini{color:#787878;font-size:12px;line-height:1.6;margin-top:8px}.editor{margin-top:10px;border:1px solid #303030;border-radius:10px;background:#0c0c0c;padding:10px}.editor textarea{width:100%;min-height:170px;resize:vertical;border:1px solid #2b2b2b;border-radius:8px;background:#080808;color:#eee;padding:10px;font:13px/1.7 "Segoe UI","Microsoft YaHei",sans-serif;outline:none;user-select:text;-webkit-user-select:text}.editor textarea:focus{border-color:#777}.status{font-size:12px;line-height:1.6;color:#8e8e8e;margin-top:8px}.status.error{color:var(--danger)}.status.ok{color:#bdbdbd}.warn{border:1px solid #4b3d1d;background:#17150d;color:#e8d899;border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.6;margin:8px 0}.doc-content{font-size:13px;line-height:1.8;color:#d8d8d8}.doc-content h1{font-size:18px;margin:10px 0;color:#fff}.doc-content h2{font-size:15px;margin:14px 0 6px;color:#fff}.doc-content h3{font-size:13px;margin:12px 0 5px;color:#fff}.doc-content pre{overflow:auto;border:1px solid #2d2d2d;background:#080808;border-radius:8px;padding:10px}.doc-content blockquote{border-left:2px solid #555;margin:8px 0;padding-left:10px;color:#aaa}.doc-content a{color:#fff}.status.ok{color:#bdbdbd}.spin{display:inline-block;width:10px;height:10px;border:2px solid #555;border-top-color:#f5f5f5;border-radius:50%;animation:spin .8s linear infinite;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}.drawer{position:absolute;left:16px;top:16px;width:min(420px,calc(100vw - 32px));max-height:calc(100vh - 86px);overflow:auto;background:rgba(15,15,15,.94);border:1px solid var(--border);border-radius:10px;padding:15px;box-shadow:0 18px 70px rgba(0,0,0,.5);backdrop-filter:blur(18px);user-select:text;-webkit-user-select:text}.drawer *{user-select:text;-webkit-user-select:text}.drawer-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.drawer h2{font-size:15px;margin:0}.doc-item{display:block;text-decoration:none;color:#ddd;border:1px solid #262626;border-radius:9px;padding:10px;margin:8px 0;background:#101010}.doc-item:hover{border-color:#555;background:#151515}.doc-item b{display:block;font-size:13px;color:#fff}.doc-item span{display:block;font-size:12px;color:#8b8b8b;margin-top:4px;line-height:1.5}.form-grid{display:grid;gap:9px}.field label{display:block;color:#888;font-size:12px;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid #2b2b2b;border-radius:8px;background:#080808;color:#eee;padding:9px;font:13px/1.6 "Segoe UI","Microsoft YaHei",sans-serif;outline:none;user-select:text;-webkit-user-select:text}.field textarea{min-height:120px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:#777}.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.42);backdrop-filter:blur(3px)}.modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(520px,calc(100vw - 32px));max-height:calc(100vh - 72px);overflow:auto;background:#101010;border:1px solid #303030;border-radius:12px;padding:16px;box-shadow:0 24px 90px rgba(0,0,0,.6)}
.doc-list{left:16px;top:16px;width:min(460px,calc(100vw - 32px));padding:15px}.doc-reader{left:50%;top:62px;transform:translateX(-50%);width:min(960px,calc(100vw - 32px));max-height:calc(100vh - 86px);padding:0;overflow:hidden;background:rgba(10,10,10,.97)}.reader-head{position:sticky;top:0;z-index:2;display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:16px 20px;border-bottom:1px solid #242424;background:rgba(12,12,12,.96);backdrop-filter:blur(18px)}.reader-title{min-width:0}.reader-title h2{font-size:18px;line-height:1.35;margin:0;color:#fff}.reader-path{margin-top:6px;color:#777;font-size:12px;line-height:1.5;word-break:break-all}.reader-actions{display:flex;gap:8px;flex:0 0 auto}.reader-body{overflow:auto;max-height:calc(100vh - 150px);padding:26px 34px 34px}.doc-content{max-width:760px;margin:0 auto;font-size:14px;line-height:1.9;color:#ddd;user-select:text;-webkit-user-select:text}.doc-content *{user-select:text;-webkit-user-select:text}.doc-content h1{font-size:26px;line-height:1.28;margin:0 0 18px;color:#fff;letter-spacing:0}.doc-content h2{font-size:19px;line-height:1.35;margin:30px 0 10px;color:#fff;padding-top:10px;border-top:1px solid #242424}.doc-content h3{font-size:15px;margin:22px 0 8px;color:#f2f2f2}.doc-content p{margin:10px 0}.doc-content ul,.doc-content ol{margin:10px 0 10px 22px;padding:0}.doc-content li{margin:5px 0}.doc-content code{font-family:Consolas,"Cascadia Code",monospace;background:#181818;border:1px solid #303030;border-radius:5px;padding:1px 5px;color:#f1f1f1}.doc-content pre{overflow:auto;border:1px solid #303030;background:#070707;border-radius:9px;padding:13px 14px;margin:14px 0}.doc-content pre code{border:0;background:transparent;padding:0}.doc-content blockquote{border-left:2px solid #777;margin:14px 0;padding:4px 0 4px 14px;color:#b5b5b5;background:#111}.doc-content table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}.doc-content th,.doc-content td{border:1px solid #303030;padding:7px 9px;text-align:left}.doc-content th{background:#151515;color:#fff}.doc-content hr{border:0;border-top:1px solid #2a2a2a;margin:24px 0}.doc-content a{color:#fff;text-decoration:underline;text-underline-offset:3px}.reader-empty{max-width:760px;margin:0 auto;color:#888;font-size:13px;line-height:1.8}

<body>
<div class="app"><header class="topbar"><div class="brand">个人知识库</div><div class="sep"></div><button class="tab active" data-filter="all">图谱</button><button class="tab" data-filter="project">项目</button><button class="tab" data-filter="concept,library,acceleration,device,service">技术</button><button class="tab" data-filter="issue">问题</button><button class="tab" id="docsView">文档</button><button class="tab" id="importMd">导入 Markdown</button><button class="tab" id="newNode">新增节点</button><button class="tab" id="resetView">重置视图</button><input id="search" class="search" placeholder="搜索节点 / 库 / 问题" /></header><main id="stage" class="stage"><svg id="graph"></svg><div class="hint">拖动画布 / 滚轮缩放 / 拖动节点 / 单击或双击节点查看知识卡片</div><div id="empty" class="empty">正在加载 graph.json...</div><aside id="panel" class="panel hidden"></aside><aside id="docsDrawer" class="drawer hidden"></aside><div id="modalHost" class="hidden"></div></main></div>
<script>
const svg=document.getElementById('graph'),stage=document.getElementById('stage'),panel=document.getElementById('panel'),empty=document.getElementById('empty'),search=document.getElementById('search'),docsDrawer=document.getElementById('docsDrawer'),modalHost=document.getElementById('modalHost');
let W=svg.clientWidth,H=svg.clientHeight,scale=1,ox=0,oy=0,filter='all',query='',nodes=[],links=[],selected=null,groupSelected=new Set(),selectBox=null;let pan=null,drag=null,groupDrag=null,dragMoved=false,lastDown=null,raf=0,editing=false,currentNote='';
const typeName={project:'项目',concept:'概念',library:'库',acceleration:'硬件加速',issue:'问题',deployment:'部署',service:'服务',tool:'工具',device:'设备',index:'索引'};
const localExplain={libavdevice:'libavdevice 是 FFmpeg 的设备输入输出库。本项目用它注册并打开 v4l2 输入，也就是让 C++ 程序能通过 /dev/video59 这类设备文件读取 Mino17 摄像头。',libavformat:'libavformat 是 FFmpeg 的封装与协议库。本项目用它处理输入流信息，并创建 FLV/RTMP 输出，把编码后的 H264 包推送给 ZLMediaKit。',libavcodec:'libavcodec 是 FFmpeg 的编解码库。本项目用它完成解码/编码调用，关键点是通过 avcodec_find_encoder_by_name("h264_rkmpp") 使用 RK3588 硬件 H264 编码。',libavutil:'libavutil 是 FFmpeg 的基础工具库，提供 AVFrame、AVPacket、时间基、错误处理、硬件上下文等底层结构。',libswscale:'libswscale 是 FFmpeg 的图像缩放与像素格式转换库。本项目的 CPU 图像处理路径会用到 UYVY、RGB、NV12 等格式转换能力。',h264_rkmpp:'h264_rkmpp 是 Rockchip MPP 暴露给 FFmpeg 的 H264 硬件编码器。本项目已经通过它完成 RK3588 硬件编码，降低 CPU 压力。',V4L2:'V4L2 是 Linux 的视频采集接口。Mino17 插到板子后会暴露 /dev/video59 这类设备节点，C++ 程序通过 FFmpeg 的 v4l2 输入打开它。',ZLMediaKit:'ZLMediaKit 是流媒体分发服务。C++ 程序只负责推一路 RTMP，ZLM 再分发为 RTMP、HTTP-FLV、HLS、RTSP 等观看地址。'};
function html(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function markdown(s){let x=html(s||'').replace(/```[\s\S]*?```/g,'').replace(/^###\s+(.+)$/gm,'<h3>$1</h3>').replace(/^[-*]\s+(.+)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>').replace(/<\/ul>\s*<ul>/g,'').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>');return '<p>'+x+'</p>'}
function docMarkdown(s){let raw=String(s||'').replace(/\r\n/g,'\n');raw=raw.replace(/^---\n[\s\S]*?\n---\n?/,'');const codeBlocks=[];raw=raw.replace(/```([\s\S]*?)```/g,(_,c)=>{const id=`@@CODE${codeBlocks.length}@@`;codeBlocks.push(`<pre><code>${html(c.trim())}</code></pre>`);return id});const lines=raw.split('\n');let out=[],list=[];function flushList(){if(list.length){out.push('<ul>'+list.map(x=>`<li>${x}</li>`).join('')+'</ul>');list=[]}}function inline(x){return html(x).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>')}for(let i=0;i<lines.length;i++){let line=lines[i];if(!line.trim()){flushList();continue}if(line.startsWith('@@CODE')){flushList();out.push(line);continue}let h=line.match(/^(#{1,3})\s+(.+)$/);if(h){flushList();out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`);continue}if(/^[-*]\s+/.test(line)){list.push(inline(line.replace(/^[-*]\s+/,'')));continue}if(/^>\s+/.test(line)){flushList();out.push(`<blockquote>${inline(line.replace(/^>\s+/,''))}</blockquote>`);continue}if(/^---+$/.test(line.trim())){flushList();out.push('<hr>');continue}out.push(`<p>${inline(line)}</p>`)}flushList();let result=out.join('\n');codeBlocks.forEach((block,i)=>{result=result.replace(`@@CODE${i}@@`,block)});return result||'<div class="reader-empty">这个文档暂时没有正文。</div>'}
function architectureHtml(n){if(!n||n.type!=='project')return '';const steps=[['采集','Mino17 / V4L2'],['处理','C++ / libav'],['编码','h264_rkmpp'],['推流','RTMP'],['分发','ZLMediaKit'],['播放','VLC / Web']];return `<div class="section"><div class="section-title">项目架构</div><div class="arch">${steps.map((x,i)=>`<div class="arch-step"><b>${x[0]}</b><span>${x[1]}</span></div>${i<steps.length-1?'<div class="arch-arrow">→</div>':''}`).join('')}</div></div>`}
function matches(n){const f=filter==='all'||filter.split(',').includes(n.type);const hay=(n.label+' '+n.type+' '+(n.summary||'')+' '+(n.tags||[]).join(' ')).toLowerCase();return f&&(!query||hay.includes(query))}function requestDraw(){if(raf)return;raf=requestAnimationFrame(()=>{raf=0;draw()})}
function computeLayout(data){const cx=W/2,cy=H/2;const order={project:0,concept:1,library:2,acceleration:2,device:2,service:2,deployment:3,issue:4,tool:3,index:3};const rings=[0,180,285,375,455],buckets={};data.nodes.forEach(n=>{const g=order[n.type]??3;(buckets[g]??=[]).push(n)});const out=[];Object.entries(buckets).forEach(([g,arr])=>{const ring=rings[Number(g)]||300,offset=Number(g)*0.52;arr.forEach((n,i)=>{const a=(Math.PI*2*i/Math.max(arr.length,1))+offset;out.push({...n,x:cx+Math.cos(a)*ring,y:cy+Math.sin(a)*ring,visible:true})})});return out}function resetView(){scale=1;ox=0;oy=0;groupSelected.clear();selectBox=null;requestDraw()}function related(n){return links.filter(l=>l.source===n||l.target===n)}
function clearGraphSelection(){selected=null;groupSelected.clear();selectBox=null;editing=false;currentNote='';panel.classList.add('hidden');requestDraw()}
function groupNodes(){return nodes.filter(n=>groupSelected.has(n.id))}
function graphRectFromPoints(a,b){const x1=Math.min(a.x,b.x),x2=Math.max(a.x,b.x),y1=Math.min(a.y,b.y),y2=Math.max(a.y,b.y);return{x:x1,y:y1,w:x2-x1,h:y2-y1}}
function groupBounds(){const arr=groupNodes().filter(n=>n.visible);if(!arr.length)return null;const pad=42;const xs=arr.map(n=>n.x),ys=arr.map(n=>n.y);const x=Math.min(...xs)-pad,y=Math.min(...ys)-pad;return{x,y,w:Math.max(...xs)-Math.min(...xs)+pad*2,h:Math.max(...ys)-Math.min(...ys)+pad*2}}
function drawRect(root,cls,r){if(!r)return;const el=document.createElementNS(svg.namespaceURI,'rect');el.setAttribute('class',cls);el.setAttribute('x',r.x);el.setAttribute('y',r.y);el.setAttribute('width',Math.max(0,r.w));el.setAttribute('height',Math.max(0,r.h));el.setAttribute('rx',12);root.appendChild(el)}
function drawSelectionLayer(root){if(groupSelected.size>1)drawRect(root,'group-bounds',groupBounds());if(selectBox)drawRect(root,'selection-rect',graphRectFromPoints(selectBox.start,selectBox.end))}
function updateBoxSelection(){if(!selectBox||!selected||selected.type!=='project')return;const r=graphRectFromPoints(selectBox.start,selectBox.end);const next=new Set([selected.id]);nodes.forEach(n=>{if(!n.visible)return;if(n.x>=r.x&&n.x<=r.x+r.w&&n.y>=r.y&&n.y<=r.y+r.h)next.add(n.id)});groupSelected=next}
function startSelectionBox(ev){ev.preventDefault();clearTextSelection();const start=screenToGraph(ev);selectBox={start,end:start};const move=e=>{e.preventDefault();clearTextSelection();selectBox.end=screenToGraph(e);updateBoxSelection();requestDraw()};const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);if(selectBox){const r=graphRectFromPoints(selectBox.start,selectBox.end);if(Math.max(r.w,r.h)<4&&selected){selectBox=null;clearGraphSelection();return}selectBox=null;requestDraw()}};window.addEventListener('pointermove',move,{passive:false});window.addEventListener('pointerup',up)}
function startGroupDrag(ev,n){ev.preventDefault();ev.stopPropagation();clearTextSelection();drag=n;dragMoved=false;lastDown={x:ev.clientX,y:ev.clientY};groupDrag={ids:new Set(groupSelected),last:{x:ev.clientX,y:ev.clientY}};const move=e=>{e.preventDefault();clearTextSelection();const dx=(e.clientX-groupDrag.last.x)/scale,dy=(e.clientY-groupDrag.last.y)/scale;if(Math.hypot(e.clientX-lastDown.x,e.clientY-lastDown.y)>3)dragMoved=true;nodes.forEach(item=>{if(groupDrag.ids.has(item.id)){item.x+=dx;item.y+=dy}});groupDrag.last={x:e.clientX,y:e.clientY};requestDraw()};const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);groupDrag=null;drag=null;requestDraw()};window.addEventListener('pointermove',move,{passive:false});window.addEventListener('pointerup',up)}

function draw(){svg.innerHTML='';const root=document.createElementNS(svg.namespaceURI,'g');root.setAttribute('transform',`translate(${ox},${oy}) scale(${scale})`);svg.appendChild(root);drawSelectionLayer(root);for(const l of links){if(!l.source||!l.target)continue;const active=selected&&(l.source===selected||l.target===selected);const line=document.createElementNS(svg.namespaceURI,'line');line.setAttribute('class','link '+(active?'active ':'')+((l.source.visible&&l.target.visible)?'':'dim'));line.setAttribute('x1',l.source.x);line.setAttribute('y1',l.source.y);line.setAttribute('x2',l.target.x);line.setAttribute('y2',l.target.y);root.appendChild(line)}for(const n of nodes){const inGroup=groupSelected.has(n.id);const g=document.createElementNS(svg.namespaceURI,'g');g.setAttribute('class',`node ${n.type} ${n.visible?'':'dim'} ${selected===n?'selected':''} ${inGroup?'group-selected':''} ${selected===n&&n.type==='project'?'group-anchor':''} ${drag===n?'dragging':''}`);g.setAttribute('transform',`translate(${n.x},${n.y})`);g.addEventListener('pointerdown',ev=>startNodeDrag(ev,n));g.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();if(!dragMoved)selectNode(n);dragMoved=false});g.addEventListener('dblclick',ev=>{ev.preventDefault();ev.stopPropagation();selectNode(n)});const c=document.createElementNS(svg.namespaceURI,'circle');c.setAttribute('r',n.type==='project'?18:(n.type==='library'?14:13));g.appendChild(c);const t=document.createElementNS(svg.namespaceURI,'text');t.setAttribute('y',n.type==='project'?34:29);t.textContent=n.label;g.appendChild(t);root.appendChild(g)}} 
function screenToGraph(ev){const rect=svg.getBoundingClientRect();return{x:(ev.clientX-rect.left-ox)/scale,y:(ev.clientY-rect.top-oy)/scale}}function clearTextSelection(){const sel=window.getSelection?.();if(sel&&sel.removeAllRanges)sel.removeAllRanges()}function screenToGraph(ev){const rect=svg.getBoundingClientRect();return{x:(ev.clientX-rect.left-ox)/scale,y:(ev.clientY-rect.top-oy)/scale}}function clearTextSelection(){const sel=window.getSelection?.();if(sel&&sel.removeAllRanges)sel.removeAllRanges()}function startNodeDrag(ev,n){if(ev.button!==0)return;if(groupSelected.size>1&&groupSelected.has(n.id)){startGroupDrag(ev,n);return}ev.preventDefault();ev.stopPropagation();clearTextSelection();drag=n;dragMoved=false;lastDown={x:ev.clientX,y:ev.clientY};try{ev.currentTarget.setPointerCapture(ev.pointerId)}catch(_e){}const move=e=>{const dx=e.clientX-lastDown.x,dy=e.clientY-lastDown.y;if(Math.hypot(dx,dy)>3)dragMoved=true;const p=screenToGraph(e);n.x=p.x;n.y=p.y;requestDraw()};const up=e=>{try{ev.currentTarget.releasePointerCapture(ev.pointerId)}catch(_e){}window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);drag=null;requestDraw()};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up)}
svg.addEventListener('pointerdown',ev=>{if(ev.target!==svg||ev.button!==0)return;if(selected&&selected.type==='project'&&!ev.shiftKey&&!ev.altKey){startSelectionBox(ev);return}ev.preventDefault();clearTextSelection();pan={x:ev.clientX,y:ev.clientY,ox,oy,moved:false};stage.classList.add('panning')});window.addEventListener('pointermove',ev=>{if(!pan)return;ev.preventDefault();clearTextSelection();if(Math.hypot(ev.clientX-pan.x,ev.clientY-pan.y)>3)pan.moved=true;ox=pan.ox+ev.clientX-pan.x;oy=pan.oy+ev.clientY-pan.y;requestDraw()},{passive:false});window.addEventListener('pointerup',()=>{if(pan&&!pan.moved&&selected)clearGraphSelection();pan=null;stage.classList.remove('panning')});svg.addEventListener('wheel',ev=>{ev.preventDefault();const rect=svg.getBoundingClientRect(),prev=scale;scale*=ev.deltaY<0?1.08:.92;scale=Math.max(.55,Math.min(2.5,scale));const mx=ev.clientX-rect.left,my=ev.clientY-rect.top;ox=mx-(mx-ox)*(scale/prev);oy=my-(my-oy)*(scale/prev);requestDraw()},{passive:false});
async function loadNote(n){const local=localStorage.getItem('node-note:'+n.id)||localStorage.getItem('ai-note:'+n.id)||localExplain[n.label]||localExplain[n.id]||'';try{const r=await fetch(`/api/node-note?id=${encodeURIComponent(n.id)}`,{cache:'no-store'});if(r.ok){const j=await r.json();return j.note||local}}catch(_e){}return local}
async function postJson(url,payload){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const j=await r.json().catch(()=>({ok:false,message:'服务返回不是 JSON'}));if(!r.ok||j.ok===false)throw new Error(j.message||`HTTP ${r.status}`);return j}
function setStatus(text,kind=''){const el=document.getElementById('editStatus');if(el){el.className='status '+kind;el.innerHTML=text}}function showEditor(){editing=true;renderPanel(selected,currentNote)}function hideEditor(){editing=false;renderPanel(selected,currentNote)}async function saveEditor(){const ta=document.getElementById('noteEditor');const note=(ta?.value||'').trim();if(!note){setStatus('解释不能为空。','error');return}setStatus('<span class="spin"></span>正在保存...');try{await postJson('/api/node-note',{id:selected.id,note,source:'manual'});localStorage.setItem('node-note:'+selected.id,note);currentNote=note;editing=false;renderPanel(selected,currentNote,'已保存到本地缓存。')}catch(e){setStatus(e.message,'error')}}async function generateAi(force=false){if(!selected)return;editing=true;renderPanel(selected,currentNote,force?'正在重新生成...':'正在调用 DeepSeek 生成...');setStatus('<span class="spin"></span>正在调用 DeepSeek，本节点只会在无缓存时生成一次。');try{const j=await postJson('/api/node-explain',{id:selected.id,force});currentNote=j.note||'';localStorage.setItem('node-note:'+selected.id,currentNote);editing=false;renderPanel(selected,currentNote,j.cached?'已读取已有缓存，没有重复调用 AI。':'DeepSeek 已生成并写入缓存。')}catch(e){setStatus(e.message,'error')}} 
async function selectNode(n){selected=n;editing=false;if(n.type==='project'){if(!groupSelected.has(n.id))groupSelected=new Set([n.id])}else if(!groupSelected.has(n.id)){groupSelected.clear()}requestDraw();currentNote=await loadNote(n);renderPanel(n,currentNote)}
function renderPanel(n,note,message=''){if(!n)return;const rel=related(n);const tags=(n.tags||[]).map(t=>`<span class="pill">${html(t)}</span>`).join('');const relHtml=rel.length?rel.map(l=>{const other=l.source===n?l.target:l.source;return `<a class="rel" href="#" data-id="${html(other.id)}">${html(l.label||'关联')} / ${html(other.label)}</a>`}).join(''):'<div class="empty-note">暂无关联。可以在 Markdown 中添加 [[双链]] 或 frontmatter links。</div>';const noteHtml=note?`<div class="note">${markdown(note)}</div>`:'<div class="empty-note">暂无扩展解释。可以手动编辑，或点击 AI 生成一次。</div>';const editor=editing?`<div class="editor"><textarea id="noteEditor" spellcheck="false">${html(note||'')}</textarea><div class="actions"><button class="btn" id="saveEditor">保存解释</button><button class="btn secondary" id="cancelEditor">取消</button><button class="btn secondary" id="aiGenerate">AI 生成一次</button><button class="btn ghost" id="aiForce">重新生成</button></div><div id="editStatus" class="status">${html(message||'编辑内容会写入 graph/node_notes，本节点后续点击直接读取缓存。')}</div></div>`:'';panel.classList.remove('hidden');panel.innerHTML=`<div class="panel-head"><h2>${html(n.label)}</h2><span class="badge">${html(typeName[n.type]||n.type)}</span></div><div class="summary">${html(n.summary||'暂无摘要。')}</div>${architectureHtml(n)}<div class="section"><div class="section-title">节点解释</div>${noteHtml}${message&&!editing?`<div class="mini">${html(message)}</div>`:''}</div>${editor}<div class="section"><div class="section-title">基础信息</div><div class="kv"><div>类型</div><div>${html(typeName[n.type]||n.type)}</div><div>文档</div><div>${html(n.doc)}</div></div></div>${tags?`<div class="section"><div class="section-title">标签</div>${tags}</div>`:''}<div class="section"><div class="section-title">关联节点</div>${relHtml}</div><div class="actions"><button class="btn" id="openDocBtn">打开文档</button><button class="btn secondary" id="editNote">编辑解释</button><button class="btn secondary" id="aiQuick">AI 生成一次</button><button class="btn secondary" id="closePanel">关闭</button></div>`;panel.querySelectorAll('.rel').forEach(a=>a.addEventListener('click',ev=>{ev.preventDefault();const target=nodes.find(x=>x.id===a.dataset.id);if(target)selectNode(target)}));const openDocBtn=document.getElementById('openDocBtn');if(openDocBtn)openDocBtn.onclick=()=>openDoc(n.doc);document.getElementById('editNote').onclick=showEditor;document.getElementById('aiQuick').onclick=()=>generateAi(false);document.getElementById('closePanel').onclick=()=>panel.classList.add('hidden');if(editing){document.getElementById('saveEditor').onclick=saveEditor;document.getElementById('cancelEditor').onclick=hideEditor;document.getElementById('aiGenerate').onclick=()=>generateAi(false);document.getElementById('aiForce').onclick=()=>generateAi(true)}}

function closeDocsDrawer(){docsDrawer.classList.add('hidden');docsDrawer.classList.remove('doc-reader','doc-list');docsDrawer.innerHTML=''}
async function openDoc(ref,fromList=false){docsDrawer.classList.remove('hidden','doc-list');docsDrawer.classList.add('doc-reader');docsDrawer.innerHTML='<div class="reader-head"><div class="reader-title"><h2>正在读取文档...</h2><div class="reader-path">'+html(ref||'')+'</div></div><div class="reader-actions"><button class="btn secondary" id="closeDocs">关闭</button></div></div><div class="reader-body"><div class="reader-empty">正在整理 Markdown 内容...</div></div>';document.getElementById('closeDocs').onclick=closeDocsDrawer;try{const j=await (await fetch(`/api/doc?path=${encodeURIComponent(ref)}`,{cache:'no-store'})).json();if(j.ok===false)throw new Error(j.message||'文档读取失败');docsDrawer.innerHTML=`<div class="reader-head"><div class="reader-title"><h2>${html(j.title||'文档')}</h2><div class="reader-path">${html(j.path||'')}</div></div><div class="reader-actions">${fromList?'<button class="btn secondary" id="backDocs">返回列表</button>':''}<button class="btn secondary" id="closeDocs">关闭</button></div></div><div class="reader-body">${j.encoding_warning?'<div class="warn">检测到这个文档可能存在历史编码损坏。建议重新导入原始 Markdown，以恢复干净中文。</div>':''}<article class="doc-content">${docMarkdown(j.content||'')}</article></div>`;document.getElementById('closeDocs').onclick=closeDocsDrawer;const back=document.getElementById('backDocs');if(back)back.onclick=openDocs}catch(e){docsDrawer.innerHTML=`<div class="reader-head"><div class="reader-title"><h2>文档读取失败</h2><div class="reader-path">${html(ref||'')}</div></div><div class="reader-actions"><button class="btn secondary" id="closeDocs">关闭</button></div></div><div class="reader-body"><div class="status error">${html(e.message)}</div></div>`;document.getElementById('closeDocs').onclick=closeDocsDrawer}}
async function openDocs(){docsDrawer.classList.remove('hidden','doc-reader');docsDrawer.classList.add('doc-list');docsDrawer.innerHTML='<div class="drawer-head"><h2>文档 / Wiki</h2><button class="btn secondary" id="closeDocs">关闭</button></div><div class="empty-note">正在读取文档...</div>';document.getElementById('closeDocs').onclick=closeDocsDrawer;try{const j=await (await fetch('/api/docs',{cache:'no-store'})).json();const docs=j.docs||[];docsDrawer.innerHTML=`<div class="drawer-head"><h2>文档 / Wiki</h2><button class="btn secondary" id="closeDocs">关闭</button></div>${docs.map((d,i)=>`<a class="doc-item" href="#" data-path="${html(d.path)}"><b>${html(d.title)}</b><span>${html(d.type_label||d.type)} / ${html(d.path)}</span><span>${html(d.summary||'暂无摘要')}</span></a>`).join('')||'<div class="empty-note">暂无文档。</div>'}`;document.getElementById('closeDocs').onclick=closeDocsDrawer;docsDrawer.querySelectorAll('.doc-item').forEach(a=>a.addEventListener('click',ev=>{ev.preventDefault();openDoc(a.dataset.path,true)}))}catch(e){docsDrawer.innerHTML=`<div class="drawer-head"><h2>文档 / Wiki</h2><button class="btn secondary" id="closeDocs">关闭</button></div><div class="status error">${html(e.message)}</div>`;document.getElementById('closeDocs').onclick=closeDocsDrawer}}
function openImportMd(){modalHost.classList.remove('hidden');modalHost.innerHTML=`<div class="modal-backdrop"></div><div class="modal"><div class="drawer-head"><h2>导入 Markdown</h2><button class="btn secondary" id="closeModal">关闭</button></div><div class="form-grid"><div class="field"><label>选择 Markdown 文件，可多选</label><input id="mdFiles" type="file" multiple accept=".md,text/markdown,text/plain" /></div><div class="field"><label>导入方式</label><select id="importMode"><option value="smart_import">智能知识导入（推荐）：自动归类、打标签、生成候选关系和 Hub</option><option value="project_package">项目资料包导入：自动拆成项目/技术/问题/部署/命令节点</option><option value="merge_by_title">保守导入：同标题合并，不主动推断关系</option><option value="split_headings">高级：按二级标题拆分</option><option value="merge_all">高级：强制合并为一个节点</option></select></div><div class="field"><label>强制合并节点标题，仅 merge_all 使用</label><input id="importTitle" placeholder="例如：RK3588 推流部署总览" /></div><div class="field"><label>节点类型</label><select id="importType"><option value="concept">技术概念</option><option value="project">项目</option><option value="issue">问题</option><option value="deployment">部署</option><option value="tool">工具</option></select></div><div class="field"><label>标签，逗号分隔</label><input id="importTags" value="导入" /></div><div class="field"><label>关联文档标题，逗号分隔</label><input id="importLinks" placeholder="可选，例如：Mino17 RK3588 红外采集推流复盘" /></div><div class="mini">说明：智能导入会自动判断文档类型、匹配已有节点、提取命令/问题/部署信息，并生成候选关系和 Hub；高级模式只处理文件切分。</div><div class="actions"><button class="btn" id="doImportMd">导入并重建图谱</button><button class="btn secondary" id="cancelNode">取消</button></div><div id="importStatus" class="status"></div></div></div>`;document.getElementById('closeModal').onclick=closeModal;document.getElementById('cancelNode').onclick=closeModal;document.getElementById('doImportMd').onclick=doImportMd}
async function readFileText(file){return await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(String(r.result||''));r.onerror=()=>reject(r.error||new Error('读取文件失败'));r.readAsText(file,'utf-8')})}
async function doImportMd(){const status=document.getElementById('importStatus');const input=document.getElementById('mdFiles');const files=Array.from(input.files||[]);if(!files.length){status.className='status error';status.textContent='请先选择 Markdown 文件。';return}status.className='status';status.innerHTML='<span class="spin"></span>正在读取文件并导入...';try{const payload={mode:document.getElementById('importMode').value,title:document.getElementById('importTitle').value,type:document.getElementById('importType').value,tags:document.getElementById('importTags').value,links:document.getElementById('importLinks').value,files:[]};for(const file of files){payload.files.push({name:file.name,content:await readFileText(file)})}const result=await postJson('/api/import-md',payload);const data=await (await fetch('graph.json?ts='+Date.now())).json();init(data);status.className='status ok';status.textContent=`导入完成：创建 ${result.created.length} 个，合并 ${result.merged.length} 个，候选关系 ${(result.candidates||[]).length} 条，候选 Hub ${(result.hubs||[]).length} 个。`;setTimeout(closeModal,1000)}catch(e){status.className='status error';status.textContent=e.message}}
function openNewNode(){modalHost.classList.remove('hidden');modalHost.innerHTML=`<div class="modal-backdrop"></div><div class="modal"><div class="drawer-head"><h2>新增节点</h2><button class="btn secondary" id="closeModal">关闭</button></div><div class="form-grid"><div class="field"><label>标题</label><input id="nodeTitle" placeholder="例如：RTMP 推流链路" /></div><div class="field"><label>类型</label><select id="nodeType"><option value="concept">技术概念</option><option value="project">项目</option><option value="library">库</option><option value="service">服务</option><option value="issue">问题</option><option value="deployment">部署</option><option value="device">设备</option><option value="tool">工具</option></select></div><div class="field"><label>摘要</label><input id="nodeSummary" placeholder="一句话说明这个节点沉淀什么" /></div><div class="field"><label>标签，逗号分隔</label><input id="nodeTags" placeholder="FFmpeg, RK3588, 推流" /></div><div class="field"><label>关联文档标题，逗号分隔</label><input id="nodeLinks" placeholder="C++ 调用 FFmpeg 库, ZLMediaKit" /></div><div class="field"><label>正文</label><textarea id="nodeBody" placeholder="记录你的理解、过程、命令或结论"></textarea></div><div class="actions"><button class="btn" id="createNode">创建并重建图谱</button><button class="btn secondary" id="cancelNode">取消</button></div><div id="nodeStatus" class="status"></div></div></div>`;document.getElementById('closeModal').onclick=closeModal;document.getElementById('cancelNode').onclick=closeModal;document.getElementById('createNode').onclick=createNode}
function closeModal(){modalHost.classList.add('hidden');modalHost.innerHTML=''}
async function createNode(){const status=document.getElementById('nodeStatus');const payload={title:document.getElementById('nodeTitle').value,type:document.getElementById('nodeType').value,summary:document.getElementById('nodeSummary').value,tags:document.getElementById('nodeTags').value,links:document.getElementById('nodeLinks').value,body:document.getElementById('nodeBody').value};status.className='status';status.innerHTML='<span class="spin"></span>正在创建 Markdown 并重建图谱...';try{await postJson('/api/node-create',payload);const data=await (await fetch('graph.json?ts='+Date.now())).json();init(data);status.className='status ok';status.textContent='已创建，图谱已刷新。';setTimeout(closeModal,700)}catch(e){status.className='status error';status.textContent=e.message}}
function applyFilter(){nodes.forEach(n=>n.visible=matches(n));empty.classList.toggle('hidden',nodes.some(n=>n.visible));if(!nodes.some(n=>n.visible))empty.textContent='没有匹配的节点';requestDraw()}document.querySelectorAll('.tab[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filter=btn.dataset.filter;applyFilter()}));document.getElementById('docsView').onclick=openDocs;const importBtn=document.getElementById('importMd');if(importBtn)importBtn.onclick=openImportMd;document.getElementById('newNode').onclick=openNewNode;document.getElementById('resetView').onclick=resetView;search.oninput=e=>{query=e.target.value.trim().toLowerCase();applyFilter()};function init(data){nodes=computeLayout(data);const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));links=data.links.map(l=>({...l,source:byId[l.source],target:byId[l.target]})).filter(l=>l.source&&l.target);applyFilter();const first=nodes.find(n=>n.type==='project')||nodes[0];if(first)selectNode(first)}window.addEventListener('resize',()=>{W=svg.clientWidth;H=svg.clientHeight});fetch('graph.json',{cache:'no-store'}).then(r=>r.json()).then(init).catch(()=>{empty.classList.remove('hidden');empty.innerHTML='无法加载 graph.json。请通过 start.bat 或 start.ps1 启动知识库。'});
</script>
