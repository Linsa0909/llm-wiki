<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>个人知识图谱</title>
<style>
:root{--bg:#080808;--panel:#111;--line:#333;--text:#f5f5f5;--muted:#999;--border:#2b2b2b;--accent:#f5f5f5}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft YaHei",Arial,sans-serif;overflow:hidden}.app{height:100vh;display:grid;grid-template-rows:48px 1fr}.topbar{display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid #1d1d1d;background:#080808}.brand{font-weight:700;font-size:13px;white-space:nowrap}.tab{height:30px;border:1px solid transparent;border-radius:7px;background:transparent;color:#aaa;padding:0 10px;cursor:pointer}.tab:hover,.tab.active{background:#171717;border-color:#333;color:#fff}.search{margin-left:auto;width:260px;max-width:28vw;height:30px;border:1px solid #292929;border-radius:7px;background:#111;color:#eee;padding:0 10px;outline:none}.stage{position:relative;overflow:hidden;background:radial-gradient(circle at 50% 45%,#111,#050505 68%);user-select:none}svg{width:100%;height:100%;display:block;cursor:grab;user-select:none}.link{stroke:#3b3b3b;stroke-width:1;stroke-opacity:.88}.link.active{stroke:#eee;stroke-width:1.7}.node{cursor:pointer}.node circle{fill:#0b0b0b;stroke:#e8e8e8;stroke-width:1.15}.node.project circle{fill:#f2f2f2;stroke:#f2f2f2}.node.library circle{stroke:#fff;stroke-width:1.8}.node.issue circle{stroke:#888;stroke-dasharray:3 3}.node.new circle{fill:#050505;stroke:#fff;stroke-width:3;stroke-dasharray:2.5 2.5}.node.selected circle{stroke-width:3}.node.multi circle{stroke:#fff;stroke-width:3.5;stroke-dasharray:5 3}.node.dim{opacity:.15}.node text{fill:#ddd;font-size:12px;text-anchor:middle;paint-order:stroke;stroke:#080808;stroke-width:4px;stroke-linejoin:round;pointer-events:none;user-select:none}.node.new text{fill:#fff;font-weight:750}.panel,.drawer,.modal{position:absolute;background:rgba(14,14,14,.96);border:1px solid var(--border);box-shadow:0 22px 70px rgba(0,0,0,.55);backdrop-filter:blur(18px)}.panel{right:16px;top:16px;width:min(440px,calc(100vw - 32px));max-height:calc(100vh - 86px);overflow:auto;border-radius:10px;padding:15px}.drawer{left:16px;top:16px;width:min(520px,calc(100vw - 32px));max-height:calc(100vh - 86px);overflow:auto;border-radius:10px;padding:15px}.doc-reader{left:auto;right:0;top:0;bottom:0;width:min(760px,calc(100vw - 40px));height:100%;max-height:none;border-radius:0;border-top:0;border-bottom:0;border-right:0;display:flex;flex-direction:column}.reader-head{padding:16px 20px;border-bottom:1px solid #242424;display:flex;justify-content:space-between;gap:12px}.reader-body{overflow:auto;padding:22px 30px 38px}.hidden{display:none!important}.badge{font-size:12px;color:#ddd;border:1px solid #333;border-radius:999px;padding:2px 8px;background:#141414;white-space:nowrap}.badge.new{border-color:#f5f5f5;background:#0b0b0b;color:#fff}.summary,.note,.doc-content{font-size:13px;line-height:1.75;color:#d4d4d4}.section{margin-top:14px;padding-top:12px;border-top:1px solid #252525}.section-title{font-size:12px;color:#858585;margin-bottom:8px}.pill{display:inline-block;margin:0 5px 5px 0;border:1px solid #303030;border-radius:999px;padding:3px 8px;color:#d0d0d0;font-size:12px;background:#121212}.rel,.doc-item{display:block;color:#ddd;text-decoration:none;border:1px solid #272727;border-radius:8px;padding:8px 10px;margin:7px 0;background:#101010}.rel:hover,.doc-item:hover{border-color:#555;background:#151515}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.btn{border:0;background:#f4f4f4;color:#050505;border-radius:7px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer}.btn.secondary{background:#151515;color:#ddd;border:1px solid #333}.btn.danger{background:#1c0d0d;color:#ffb4b4;border:1px solid #5a2424}.btn.danger:hover{background:#2a1111;border-color:#884040}.ctx-menu{position:absolute;z-index:45;width:210px;padding:8px;border:1px solid #2b2b2b;border-radius:10px;background:rgba(12,12,12,.98);box-shadow:0 18px 48px rgba(0,0,0,.55);backdrop-filter:blur(14px)}.ctx-title{font-size:12px;color:#999;padding:5px 6px 8px;border-bottom:1px solid #242424;margin-bottom:6px}.ctx-menu button{display:block;width:100%;text-align:left;margin:3px 0}.empty,.hint{position:absolute;color:#777;font-size:12px;pointer-events:none}.empty{inset:0;display:grid;place-items:center}.hint{left:16px;bottom:14px}.field{margin:9px 0}.field label{display:block;color:#999;font-size:12px;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid #2b2b2b;border-radius:8px;background:#080808;color:#eee;padding:9px;font:13px/1.6 "Segoe UI","Microsoft YaHei",sans-serif;outline:none}.field textarea{min-height:130px;resize:vertical}.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}.modal{left:50%;top:50%;transform:translate(-50%,-50%);width:min(560px,calc(100vw - 32px));max-height:calc(100vh - 72px);overflow:auto;border-radius:12px;padding:16px;z-index:50}.status{font-size:12px;line-height:1.6;color:#aaa;margin-top:8px}.status.error{color:#ff7979}.status.ok{color:#d0d0d0}.doc-content h1{font-size:25px}.doc-content h2{font-size:18px;border-top:1px solid #252525;padding-top:12px;margin-top:26px}.doc-content pre{overflow:auto;border:1px solid #303030;background:#070707;border-radius:8px;padding:12px}.doc-content code{font-family:Consolas,monospace;background:#181818;border:1px solid #303030;border-radius:5px;padding:1px 5px}.doc-content pre code{border:0;background:transparent;padding:0}.doc-content a{color:#fff}.kv{display:grid;grid-template-columns:72px 1fr;gap:6px 10px;font-size:12px;color:#bebebe}
@media(max-width:820px){.search{display:none}.tab{padding:0 7px}.panel{left:12px;right:12px;top:auto;bottom:12px;width:auto;max-height:55vh}.drawer,.doc-reader{left:0;right:0;top:0;bottom:0;width:100%;height:100%;max-height:none;border-radius:0}.hint{display:none}}
.reader-actions{display:flex;gap:8px;align-items:flex-start}.doc-editor{width:100%;min-height:calc(100vh - 150px);resize:none;border:1px solid #2b2b2b;border-radius:10px;background:#080808;color:#eee;padding:16px;font:13px/1.7 Consolas,"Microsoft YaHei",monospace;outline:none}.node polygon{fill:#0b0b0b;stroke:#fff;stroke-width:1.5}.node.project polygon{fill:#f2f2f2;stroke:#f2f2f2}.node.selected polygon{stroke-width:3}.node.multi polygon{stroke:#fff;stroke-width:3.5;stroke-dasharray:5 3}.codebox{position:relative;margin:12px 0}.codebox pre{margin:0}.codebox code{display:block;padding-right:64px}.copy-code{position:absolute;right:8px;top:8px;z-index:2;min-width:44px;height:28px;border:1px solid #3a3a3a;border-radius:6px;background:#101010;color:#e8e8e8;font-size:12px;font-weight:700;cursor:pointer}.copy-code:hover{border-color:#777;background:#181818;color:#fff}.copy-code.done{border-color:#777;background:#f4f4f4;color:#050505}.merge-progress{margin-top:14px;border:1px solid #2c2c2c;border-radius:10px;background:#0c0c0c;padding:12px}.merge-bar{height:8px;border:1px solid #333;border-radius:999px;background:#070707;overflow:hidden}.merge-bar span{display:block;height:100%;width:0;background:#f2f2f2;transition:width .35s ease}.merge-stage{display:flex;justify-content:space-between;gap:10px;margin-top:8px;color:#d8d8d8;font-size:12px}.merge-log{margin-top:10px;max-height:170px;overflow:auto;border-top:1px solid #232323;padding-top:8px;font-size:12px;line-height:1.65;color:#aaa}.merge-log div{padding:2px 0}.merge-result{margin-top:10px;border:1px solid #303030;border-radius:8px;background:#101010;padding:9px;color:#d8d8d8;font-size:12px;line-height:1.65}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">个人知识库</div>
    <button class="tab active" data-filter="all">图谱</button>
    <button class="tab" data-filter="project">项目</button>
    <button class="tab" data-filter="concept,library,acceleration,device,service,tool">技术</button>
    <button class="tab" data-filter="issue">问题</button>
    <button class="tab" data-filter="new">新增</button>
    <button class="tab" id="docsView">文档</button>
    <button class="tab" id="importMd">导入 Markdown</button>
    <button class="tab" id="newNode">新增节点</button>
    <button class="tab" id="resetView">重置视图</button>
    <input id="search" class="search" placeholder="搜索节点 / 标签 / 摘要" />
  </header>
  <main id="stage" class="stage">
    <svg id="graph"></svg>
    <div class="hint">拖动画布 / 滚轮缩放 / 拖动节点 / 单击节点查看知识卡片</div>
    <div id="empty" class="empty">正在加载 graph.json...</div>
    <aside id="panel" class="panel hidden"></aside>
    <aside id="drawer" class="drawer hidden"></aside>
    <div id="contextMenu" class="ctx-menu hidden"></div>
    <div id="modalHost" class="hidden"></div>
  </main>
</div>
<script>
const svg=document.getElementById('graph'),stage=document.getElementById('stage'),panel=document.getElementById('panel'),drawer=document.getElementById('drawer'),empty=document.getElementById('empty'),search=document.getElementById('search'),modalHost=document.getElementById('modalHost'),contextMenu=document.getElementById('contextMenu');
let W=svg.clientWidth,H=svg.clientHeight,scale=1,ox=0,oy=0,filter='all',query='',nodes=[],links=[],selected=null,drag=null,pan=null,last={x:0,y:0},dragMoved=false,raf=0,savedLayout={positions:{},viewport:{}},saveTimer=0,multiSelected=new Set();
const typeName={project:'项目',concept:'概念',library:'库',acceleration:'硬件加速',issue:'问题',deployment:'部署',service:'服务',tool:'工具',device:'设备',index:'索引',note:'笔记'};
function html(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function codeBlock(c,lang=''){const label=lang?`复制 ${html(lang)}`:'复制';return `<div class="codebox"><button class="copy-code" type="button" title="复制代码">${label}</button><pre><code>${html(String(c||'').trim())}</code></pre></div>`}
function md(s){let raw=String(s||'').replace(/\r\n/g,'\n').replace(/^---\n[\s\S]*?\n---\n?/,'');const code=[];raw=raw.replace(/```([^\n`]*)\n([\s\S]*?)```/g,(_,lang,c)=>{let id=`@@C${code.length}@@`;code.push(codeBlock(c,String(lang||'').trim()));return id});raw=raw.replace(/```([\s\S]*?)```/g,(_,c)=>{let id=`@@C${code.length}@@`;code.push(codeBlock(c));return id});let out=raw.split('\n').map(line=>{if(line.startsWith('@@C'))return line;if(/^###\s+/.test(line))return `<h3>${html(line.replace(/^###\s+/,''))}</h3>`;if(/^##\s+/.test(line))return `<h2>${html(line.replace(/^##\s+/,''))}</h2>`;if(/^#\s+/.test(line))return `<h1>${html(line.replace(/^#\s+/,''))}</h1>`;if(!line.trim())return '';return `<p>${html(line).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</p>`}).join('\n');code.forEach((c,i)=>out=out.replace(`@@C${i}@@`,c));return out||'<div class="status">这个文档暂时没有正文。</div>'}
async function copyText(text){if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(text);return}const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';ta.style.top='0';document.body.appendChild(ta);ta.focus();ta.select();const ok=document.execCommand('copy');ta.remove();if(!ok)throw new Error('copy failed')}
function requestDraw(){if(raf)return;raf=requestAnimationFrame(()=>{raf=0;draw()})}
function layoutPayload(){const positions={};nodes.forEach(n=>{if(Number.isFinite(n.x)&&Number.isFinite(n.y))positions[n.id]={x:n.x,y:n.y}});return{positions,viewport:{scale,ox,oy}}}
function saveLayoutNow(){if(!nodes.length)return;savedLayout=layoutPayload();postJson('/api/graph-layout',savedLayout).catch(()=>{})}
function saveLayoutSoon(){clearTimeout(saveTimer);saveTimer=setTimeout(saveLayoutNow,450)}
function matches(n){const f=filter==='all'||(filter==='new'?n.is_new:filter.split(',').includes(n.type));const hay=(n.label+' '+n.type+' '+(n.summary||'')+' '+(n.tags||[]).join(' ')).toLowerCase();return f&&(!query||hay.includes(query))}
function hash01(s){let h=2166136261;for(let i=0;i<String(s).length;i++){h^=String(s).charCodeAt(i);h=Math.imul(h,16777619)}return((h>>>0)%10000)/10000}
function edgeWeight(l){const label=String(l.label||'');if(label.includes('关联'))return 1;if(label.includes('引用'))return .75;if(label.includes('提到'))return .35;return .55}
function savedPos(id){const p=savedLayout.positions&&savedLayout.positions[id];if(!p)return null;const x=Number(p.x),y=Number(p.y);return Number.isFinite(x)&&Number.isFinite(y)?{x,y}:null}
function computeComponents(rawNodes,rawLinks){const ids=new Set(rawNodes.map(n=>n.id)),adj=Object.fromEntries(rawNodes.map(n=>[n.id,[]]));rawLinks.forEach(l=>{if(ids.has(l.source)&&ids.has(l.target)){adj[l.source].push(l.target);adj[l.target].push(l.source)}});const seen=new Set(),groups=[];rawNodes.forEach(n=>{if(seen.has(n.id))return;const q=[n.id],g=[];seen.add(n.id);while(q.length){const id=q.shift();g.push(id);(adj[id]||[]).forEach(o=>{if(!seen.has(o)){seen.add(o);q.push(o)}})}groups.push(g)});return groups.sort((a,b)=>b.length-a.length)}
function computeLayout(data){const rawNodes=(data.nodes||[]).map(n=>({...n,visible:true})),rawLinks=data.links||[],byId=Object.fromEntries(rawNodes.map(n=>[n.id,n]));const comps=computeComponents(rawNodes,rawLinks),centers={};const cols=Math.max(1,Math.ceil(Math.sqrt(comps.length||1))),gapX=Math.max(520,W*.5),gapY=390;comps.forEach((ids,i)=>{const row=Math.floor(i/cols),col=i%cols;centers[ids.join('|')]={x:W/2+(col-(cols-1)/2)*gapX,y:H/2+row*gapY}});const compCenter={};comps.forEach(ids=>{const c=centers[ids.join('|')];ids.forEach(id=>compCenter[id]=c)});rawNodes.forEach((n,i)=>{const p=savedPos(n.id);if(p){n.x=p.x;n.y=p.y;n.fixed=true;return}const c=compCenter[n.id]||{x:W/2,y:H/2};const a=hash01(n.id)*Math.PI*2,r=80+hash01(n.label||n.id)*190;n.x=c.x+Math.cos(a)*r;n.y=c.y+Math.sin(a)*r;n.fixed=false});for(let iter=0;iter<90;iter++){for(let i=0;i<rawNodes.length;i++)for(let j=i+1;j<rawNodes.length;j++){const a=rawNodes[i],b=rawNodes[j],dx=a.x-b.x,dy=a.y-b.y,d2=Math.max(1600,dx*dx+dy*dy),f=850/d2,fx=dx*f,fy=dy*f;if(!a.fixed){a.x+=fx;a.y+=fy}if(!b.fixed){b.x-=fx;b.y-=fy}}rawLinks.forEach(l=>{const a=byId[l.source],b=byId[l.target];if(!a||!b)return;const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(1,Math.hypot(dx,dy)),target=160+(1-edgeWeight(l))*130,k=(d-target)*.012*edgeWeight(l),fx=dx/d*k,fy=dy/d*k;if(!a.fixed){a.x+=fx;a.y+=fy}if(!b.fixed){b.x-=fx;b.y-=fy}});rawNodes.forEach(n=>{if(n.fixed)return;const c=compCenter[n.id]||{x:W/2,y:H/2};n.x+=(c.x-n.x)*.012;n.y+=(c.y-n.y)*.012})}return rawNodes}
function applyFilter(){nodes.forEach(n=>n.visible=matches(n));empty.classList.toggle('hidden',nodes.some(n=>n.visible));empty.textContent=nodes.some(n=>n.visible)?'':'没有匹配的节点';requestDraw()}
function screenToGraph(ev){const r=svg.getBoundingClientRect();return{x:(ev.clientX-r.left-ox)/scale,y:(ev.clientY-r.top-oy)/scale}}
function starPoints(r1,r2){let pts=[];for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,r=i%2?r2:r1;pts.push(`${Math.cos(a)*r},${Math.sin(a)*r}`)}return pts.join(' ')}
function selectedNeighbor(n){return selected&&links.some(l=>(l.source===selected&&l.target===n)||(l.target===selected&&l.source===n))}
function readableNode(n){return n.visible||n===selected||selectedNeighbor(n)}
function draw(){svg.innerHTML='';const root=document.createElementNS(svg.namespaceURI,'g');root.setAttribute('transform',`translate(${ox},${oy}) scale(${scale})`);svg.appendChild(root);for(const l of links){if(!l.source||!l.target||l.visible===false)continue;const line=document.createElementNS(svg.namespaceURI,'line');const readable=readableNode(l.source)&&readableNode(l.target);line.setAttribute('class','link '+(selected&&(l.source===selected||l.target===selected)?'active ':'')+(readable?'':'dim'));line.setAttribute('x1',l.source.x);line.setAttribute('y1',l.source.y);line.setAttribute('x2',l.target.x);line.setAttribute('y2',l.target.y);root.appendChild(line)}for(const n of nodes){const g=document.createElementNS(svg.namespaceURI,'g');g.setAttribute('class',`node ${n.type} ${n.is_new?'new':''} ${readableNode(n)?'':'dim'} ${selected===n?'selected':''} ${multiSelected.has(n.id)?'multi':''}`);g.setAttribute('transform',`translate(${n.x},${n.y})`);g.onpointerdown=e=>{e.stopPropagation();if(e.ctrlKey||e.metaKey)return;startDrag(e,n)};g.onclick=e=>{e.stopPropagation();if(!dragMoved){if(e.ctrlKey||e.metaKey)toggleMulti(n);else{clearMulti();selectNode(n)}}};g.oncontextmenu=e=>{e.preventDefault();e.stopPropagation();if(!multiSelected.has(n.id)){multiSelected.add(n.id);selectNode(n,{focus:false})}openNodeContextMenu(e.clientX,e.clientY)};const hit=document.createElementNS(svg.namespaceURI,'circle');hit.setAttribute('r',Math.max(30,Math.min(90,String(n.label||'').length*3.8)));hit.setAttribute('fill','#000');hit.setAttribute('opacity','0');hit.setAttribute('pointer-events','all');g.appendChild(hit);const r=n.is_new?16:(n.type==='project'?18:(n.type==='library'?14:13));if(n.importance==='high'){const p=document.createElementNS(svg.namespaceURI,'polygon');p.setAttribute('points',starPoints(r+4,(r+4)*.48));g.appendChild(p)}else{const c=document.createElementNS(svg.namespaceURI,'circle');c.setAttribute('r',r);g.appendChild(c)}const t=document.createElementNS(svg.namespaceURI,'text');t.setAttribute('y',n.type==='project'?34:29);t.textContent=n.label;g.appendChild(t);root.appendChild(g)}}
function startDrag(ev,n){if(ev.button!==0)return;ev.preventDefault();drag=n;dragMoved=false;last={x:ev.clientX,y:ev.clientY};const move=e=>{const p=screenToGraph(e);if(Math.hypot(e.clientX-last.x,e.clientY-last.y)>3)dragMoved=true;n.x=p.x;n.y=p.y;n.fixed=true;requestDraw()};const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);if(dragMoved)saveLayoutNow();drag=null};window.addEventListener('pointermove',move);window.addEventListener('pointerup',up)}
function related(n){return links.filter(l=>l.source===n||l.target===n)}
function selectedMultiNodes(){return nodes.filter(n=>multiSelected.has(n.id))}
function clearMulti(){if(multiSelected.size){multiSelected.clear();requestDraw()}hideContextMenu()}
function toggleMulti(n){if(multiSelected.has(n.id))multiSelected.delete(n.id);else multiSelected.add(n.id);selectNode(n,{focus:false});requestDraw()}
function hideContextMenu(){contextMenu.classList.add('hidden');contextMenu.innerHTML=''}
function openNodeContextMenu(x,y){const picked=selectedMultiNodes();contextMenu.classList.remove('hidden');contextMenu.style.left=Math.min(x,window.innerWidth-230)+'px';contextMenu.style.top=Math.min(y,window.innerHeight-150)+'px';contextMenu.innerHTML=`<div class="ctx-title">已选择 ${picked.length} 个节点</div><button class="btn secondary" id="ctxRel" ${picked.length<2?'disabled':''}>进行关联（增量）</button><button class="btn" id="ctxMerge" ${picked.length<2?'disabled':''}>进行合并</button><button class="btn secondary" id="ctxCancel">取消选择</button>`;document.getElementById('ctxRel').onclick=associateSelected;document.getElementById('ctxMerge').onclick=openMergeSelected;document.getElementById('ctxCancel').onclick=()=>{clearMulti();selected=null;panel.classList.add('hidden');requestDraw()}}
async function associateSelected(){const picked=selectedMultiNodes();if(picked.length<2)return;hideContextMenu();modalFrame('进行关联（增量）',`<div class="summary">将为 ${picked.length} 个已选节点建立两两关联，不会删除已有关系。</div><div id="batchRelationStatus" class="status">正在写入关联...</div>`);const s=document.getElementById('batchRelationStatus');try{const j=await postJson('/api/relation-add-batch',{ids:picked.map(n=>n.id),label:'关联'});await reloadGraph();s.className='status ok';s.textContent=`已新增 ${j.count} 条关联，确认 ${j.checked} 个节点组合，图谱已刷新。`;setTimeout(closeModal,800)}catch(e){s.className='status error';s.textContent=e.message}}
function openMergeSelected(){const picked=selectedMultiNodes();if(picked.length<2)return;hideContextMenu();const list=picked.map(n=>`<span class="pill">${html(n.label)}</span>`).join('');modalFrame('合并为知识文档',`<div class="summary">DeepSeek 会读取这些节点背后的 Markdown，生成一份新的技术知识整合文档。合并完成后，来源节点会从图谱中消失，原 Markdown 会移动到 raw/merged 目录备份。</div><div class="section">${list}</div><div class="field"><label>新文档标题，可留空由 AI 内容识别</label><input id="mergeTitle" placeholder="例如：Docker Buildx 与离线镜像部署知识整合"></div><div class="actions"><button class="btn" id="doMergeNodes">开始合并</button><button class="btn secondary" id="cancelMergeNodes">取消</button></div><div id="mergeStatus" class="status"></div><div id="mergeProgress" class="merge-progress hidden"><div class="merge-bar"><span id="mergeBar"></span></div><div class="merge-stage"><span id="mergeStage">等待开始</span><span id="mergePct">0%</span></div><div id="mergeLog" class="merge-log"></div><div id="mergeResult" class="merge-result hidden"></div></div>`);document.getElementById('cancelMergeNodes').onclick=closeModal;document.getElementById('doMergeNodes').onclick=mergeSelectedNodes}

async function openDoc(ref){drawer.classList.remove('hidden');drawer.classList.add('doc-reader');drawer.innerHTML=`<div class="reader-head"><div><h2 style="margin:0">正在读取文档...</h2><div class="status">${html(ref||'')}</div></div><div class="reader-actions"><button class="btn secondary" id="closeDrawer">关闭</button></div></div><div class="reader-body status">加载中...</div>`;document.getElementById('closeDrawer').onclick=()=>drawer.classList.add('hidden');try{const j=await (await fetch(`/api/doc?path=${encodeURIComponent(ref)}`,{cache:'no-store'})).json();if(j.ok===false)throw new Error(j.message||'文档读取失败');renderDocView(j,false)}catch(e){drawer.querySelector('.reader-body').innerHTML=`<div class="status error">${html(e.message)}</div>`}}

async function loadNodeNote(n){const box=document.getElementById('nodeNote');if(!box)return;try{const r=await fetch(`/api/node-note?id=${encodeURIComponent(n.id)}`,{cache:'no-store'});if(!r.ok)throw new Error('empty');const j=await r.json();renderNodeNote(j.note||'',j)}catch(_e){box.innerHTML='<div class="status">暂无扩展解释。可以手动编辑，或点击 AI 生成一次。</div>'}}
async function generateNodeNote(n){const box=document.getElementById('nodeNote'),btn=document.getElementById('aiNoteBtn');if(btn)btn.disabled=true;if(box)box.innerHTML='<div class="status">正在调用 DeepSeek 生成节点解释，生成后会写入本地缓存...</div>';try{const j=await postJson('/api/node-explain',{id:n.id,force:false});renderNodeNote(j.note||'',j)}catch(e){if(box)box.innerHTML=`<div class="status error">${html(e.message)}</div>`}finally{if(btn)btn.disabled=false}}
async function openEditNodeNote(n){let current='';try{const r=await fetch(`/api/node-note?id=${encodeURIComponent(n.id)}`,{cache:'no-store'});if(r.ok){const j=await r.json();current=j.note||''}}catch(_e){}modalFrame('编辑节点解释',`<div class="field"><label>${html(n.label)}</label><textarea id="noteEditText" style="min-height:260px">${html(current)}</textarea></div><div class="actions"><button class="btn" id="saveNodeNote">保存解释</button><button class="btn secondary" id="cancelNodeNote">取消</button></div><div id="noteEditStatus" class="status"></div>`);document.getElementById('cancelNodeNote').onclick=closeModal;document.getElementById('saveNodeNote').onclick=async()=>{const s=document.getElementById('noteEditStatus'),value=document.getElementById('noteEditText').value.trim();if(!value){s.className='status error';s.textContent='解释内容不能为空。';return}s.textContent='正在保存...';try{const j=await postJson('/api/node-note',{id:n.id,note:value,source:'manual'});renderNodeNote(j.note||value,j);s.className='status ok';s.textContent='已保存。';setTimeout(closeModal,600)}catch(e){s.className='status error';s.textContent=e.message}}}function openImportMd(){modalFrame('导入 Markdown',`<div class="field"><label>选择 Markdown 文件，可多选</label><input id="mdFiles" type="file" multiple accept=".md,text/markdown,text/plain"></div><div class="field"><label>导入方式</label><select id="importMode"><option value="smart_import">智能知识导入</option><option value="project_package">项目资料包导入</option><option value="merge_by_title">保守导入：同标题合并</option><option value="split_headings">按二级标题拆分</option><option value="merge_all">强制合并为一个节点</option></select></div><div class="field"><label>强制合并标题，仅 merge_all 使用</label><input id="importTitle"></div><div class="field"><label>节点类型</label><select id="importType"><option value="concept">技术概念</option><option value="project">项目</option><option value="issue">问题</option><option value="deployment">部署</option><option value="tool">工具</option></select></div><div class="field"><label>标签，逗号分隔</label><input id="importTags" value="导入"></div><div class="field"><label>关联文档标题，逗号分隔</label><input id="importLinks"></div><div class="actions"><button class="btn" id="doImportMd">导入并重建图谱</button></div><div id="importStatus" class="status"></div>`);document.getElementById('doImportMd').onclick=doImportMd}
async function readFileText(file){return await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(String(r.result||''));r.onerror=()=>reject(r.error||new Error('读取失败'));r.readAsText(file,'utf-8')})}
async function doImportMd(){const s=document.getElementById('importStatus'),files=Array.from(mdFiles.files||[]);if(!files.length){s.className='status error';s.textContent='请先选择 Markdown 文件。';return}s.textContent='正在导入...';try{const payload={mode:importMode.value,title:importTitle.value,type:importType.value,tags:importTags.value,links:importLinks.value,files:[]};for(const f of files)payload.files.push({name:f.name,content:await readFileText(f)});const result=await postJson('/api/import-md',payload);await reloadGraph();s.className='status ok';s.textContent=`导入完成：创建 ${result.created?.length||0} 个，合并 ${result.merged?.length||0} 个。`;setTimeout(closeModal,900)}catch(e){s.className='status error';s.textContent=e.message}}
async function loadLayout(){try{const j=await (await fetch('/api/graph-layout?ts='+Date.now(),{cache:'no-store'})).json();savedLayout={positions:j.positions||{},viewport:j.viewport||{}};return savedLayout}catch(_e){savedLayout={positions:{},viewport:{}};return savedLayout}}
async function reloadGraph(){await loadLayout();const data=await (await fetch('graph.json?ts='+Date.now(),{cache:'no-store'})).json();init(data,false)}
function resetView(){scale=1;ox=0;oy=0;requestDraw();saveLayoutSoon()}
function focusNode(n){if(!n)return;scale=Math.max(.7,Math.min(1.4,scale||1));ox=W/2-n.x*scale;oy=H/2-n.y*scale;requestDraw();saveLayoutSoon()}
function focusNeighborhood(n){if(!n)return;const group=[n,...related(n).map(l=>l.source===n?l.target:l.source)].filter(Boolean);if(group.length<2)return;const screen=p=>({x:p.x*scale+ox,y:p.y*scale+oy});const off=group.some(p=>{const s=screen(p);return s.x<40||s.x>W-480||s.y<60||s.y>H-60});if(!off)return;let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;group.forEach(p=>{minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);minY=Math.min(minY,p.y);maxY=Math.max(maxY,p.y)});const pad=120,usableW=Math.max(360,W-500),usableH=Math.max(260,H-140),bw=Math.max(1,maxX-minX+pad*2),bh=Math.max(1,maxY-minY+pad*2);scale=Math.max(.45,Math.min(1.35,usableW/bw,usableH/bh));ox=usableW/2-(minX+maxX)/2*scale+20;oy=H/2-(minY+maxY)/2*scale;requestDraw();saveLayoutSoon()}
function init(data,restoreViewport=true){nodes=computeLayout(data);const byId=Object.fromEntries(nodes.map(n=>[n.id,n]));links=(data.links||[]).map(l=>({...l,source:byId[l.source],target:byId[l.target]})).filter(l=>l.source&&l.target);if(restoreViewport&&savedLayout.viewport){const v=savedLayout.viewport;if(Number.isFinite(Number(v.scale)))scale=Number(v.scale);if(Number.isFinite(Number(v.ox)))ox=Number(v.ox);if(Number.isFinite(Number(v.oy)))oy=Number(v.oy)}applyFilter();const keep=selected&&nodes.find(n=>n.id===selected.id);const newest=[...nodes].reverse().find(n=>n.is_new&&n.visible!==false);const first=keep||newest||nodes.find(n=>n.type==='project')||nodes[0];if(first){selectNode(first);if(!keep&&first.is_new)focusNode(first)}saveLayoutSoon()}
document.querySelectorAll('.tab[data-filter]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');filter=btn.dataset.filter;applyFilter()});
document.getElementById('docsView').onclick=openDocs;document.getElementById('importMd').onclick=openImportMd;document.getElementById('newNode').onclick=openNewNode;document.getElementById('resetView').onclick=resetView;search.oninput=e=>{query=e.target.value.trim().toLowerCase();applyFilter()};
document.addEventListener('click',async e=>{const btn=e.target.closest('.copy-code');if(!btn)return;e.preventDefault();e.stopPropagation();const code=btn.closest('.codebox')?.querySelector('code')?.innerText||'';try{await copyText(code);const old=btn.textContent;btn.textContent='已复制';btn.classList.add('done');setTimeout(()=>{btn.textContent=old;btn.classList.remove('done')},1100)}catch(_err){btn.textContent='失败';setTimeout(()=>btn.textContent='复制',1100)}});
svg.onpointerdown=e=>{if(e.target!==svg)return;hideContextMenu();pan={x:e.clientX,y:e.clientY,ox,oy,moved:false}};window.onpointermove=e=>{if(!pan)return;pan.moved=true;ox=pan.ox+e.clientX-pan.x;oy=pan.oy+e.clientY-pan.y;requestDraw()};window.onpointerup=()=>{if(pan&&pan.moved)saveLayoutSoon();if(pan&&!pan.moved){selected=null;clearMulti();panel.classList.add('hidden');drawer.classList.add('hidden');requestDraw()}pan=null};svg.oncontextmenu=e=>{e.preventDefault();hideContextMenu()};svg.onwheel=e=>{e.preventDefault();const r=svg.getBoundingClientRect(),prev=scale;scale*=e.deltaY<0?1.08:.92;scale=Math.max(.5,Math.min(2.7,scale));const mx=e.clientX-r.left,my=e.clientY-r.top;ox=mx-(mx-ox)*(scale/prev);oy=my-(my-oy)*(scale/prev);requestDraw();saveLayoutSoon()};
function closeOpenSurface(){if(!modalHost.classList.contains('hidden')){closeModal();return true}if(!contextMenu.classList.contains('hidden')){hideContextMenu();return true}let closed=false;if(!drawer.classList.contains('hidden')){drawer.classList.add('hidden');closed=true}if(!panel.classList.contains('hidden')){panel.classList.add('hidden');selected=null;closed=true}if(closed){clearMulti();requestDraw()}return closed}
function canUseNodeSearchShortcut(){if(document.getElementById('docEditor'))return false;if(!modalHost.classList.contains('hidden'))return false;const el=document.activeElement;if(!el||el===document.body||el===svg||el===stage||el===search)return true;return !['INPUT','TEXTAREA','SELECT'].includes(el.tagName)}
window.addEventListener('keydown',e=>{const key=String(e.key).toLowerCase();if((e.ctrlKey||e.metaKey)&&key==='s'&&document.getElementById('docEditor')){e.preventDefault();saveOpenDoc();return}if(key==='escape'){if(closeOpenSurface())e.preventDefault();return}if((e.ctrlKey||e.metaKey)&&key==='f'&&canUseNodeSearchShortcut()){e.preventDefault();search.focus();search.select()}});
window.onresize=()=>{W=svg.clientWidth;H=svg.clientHeight};loadLayout().then(()=>fetch('graph.json',{cache:'no-store'})).then(r=>r.json()).then(data=>init(data,true)).catch(()=>{empty.classList.remove('hidden');empty.textContent='无法加载 graph.json，请通过 start.ps1 启动知识库服务。'});
</script>
</body>
